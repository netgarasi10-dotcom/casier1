workflows:
  html-capacitor-android:
    name: HTML/JS/CSS Android via Capacitor
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
      java: 17
    triggering:
      events:
        - push
      branches:
        - main
    scripts:
      - name: Install dependencies
        script: |
          npm install
      - name: Build Web Assets (jika menggunakan bundler seperti Vite/Webpack)
        script: |
          # Buka tanda pagar di bawah jika Anda menggunakan build step (misal: npm run build)
          # npm run build 
      - name: Sync Capacitor to Android
        script: |
          npx cap sync android
      - name: Set up chmod for Gradle
        script: |
          cd android && chmod +x gradlew
      - name: Build Android APK
        script: |
          cd android && ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/apk/release/*.apk
    publishing:
      email:
        recipients:
          - email_anda@domain.com # Ganti dengan email Anda
