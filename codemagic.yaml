workflows:
  my-android-workflow:
    name: Android Build Workflow
    environment:
      java: 21
      android_signing:
        - kunci-android
    
    # TAMBAHKAN BAGIAN INI AGAR LINK DOWNLOAD MUNCUL
    artifacts:
      - android/app/build/outputs/apk/**/*.apk

    scripts:
      - name: Install & Sync Android
        script: |
          npm install
          npm run build
          npx cap sync android

      - name: Build and Sign Android APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file="$CM_KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$CM_KEYSTORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$CM_KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$CM_KEY_PASSWORD"