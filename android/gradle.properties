# Project-wide Gradle settings.

# Menjaga penggunaan RAM Gradle tetap irit di 1.5 GB
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=512m

# Mengaktifkan fitur rakit paralel agar prosesnya dibagi dan lebih cepat
org.gradle.parallel=true

# Menyimpan hasil rakitan sebelumnya agar proses berikutnya tidak mengulang dari nol
org.gradle.caching=true

# Pengaturan bawaan AndroidX
android.useAndroidX=true